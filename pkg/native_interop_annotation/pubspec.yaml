name: native_interop_annotation
version: 0.1.0
description: >-
  Annotations for expressing OS-level API availability on FFI/ObjC native
  interop bindings generated by ffigen. Enables static lint-time checking of
  iOS/macOS API compatibility.
repository: https://github.com/dart-lang/sdk/tree/main/pkg/native_interop_annotation

topics:
  - static-analysis
  - ffi
  - native-interop

environment:
  sdk: ^3.5.0

resolution: workspace

dev_dependencies:
  lints: any
