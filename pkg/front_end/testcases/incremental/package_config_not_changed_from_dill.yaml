# If `bypassCache` is set to true if `_invalidatedUris` contains
# `packagesUriRaw` (which it isn't) and `_previousPackagesMap` is then used as
# `_previousPackagesMap!` instead of `_previousPackagesMap?` (which it isn't)
# we would crash on this test.

type: newworld
worlds:
  - entry: package:foo/a.dart
    sources:
      .dart_tool/package_config.json: |
        {
          "configVersion": 2,
          "packages": [
            {
              "name": "foo",
              "rootUri": "../foo",
              "packageUri": "lib"
            },
            {
              "name": "bar",
              "rootUri": "../bar",
              "packageUri": "lib"
            }
          ]
        }
      foo/lib/a.dart: |
        import "package:bar/a.dart";
        void main() {
          A();
        }
      bar/lib/a.dart: |
        class A {
          new() {
            print("A");
          }
        }
    expectedLibraryCount: 2

  - entry: package:foo/a.dart
    expectInitializeFromDill: true
    invalidate:
      - .dart_tool/package_config.json
    sources:
      .dart_tool/package_config.json: |
        {
          "configVersion": 2,
          "packages": [
            {
              "name": "foo",
              "rootUri": "../foo",
              "packageUri": "lib"
            },
            {
              "name": "bar",
              "rootUri": "../bar",
              "packageUri": "lib"
            }
          ]
        }
      # The other sources are never read anyway.
    expectedLibraryCount: 2
    advancedInvalidation: noDirectlyInvalidated
