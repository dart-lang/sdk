  import "dart:developer";

  class Foo extends Bar {
    int _bar;
    int baz;
    Foo({required this._bar}) : baz = _bar {
      debugger();
      print(_bar);
    }
  }

  class Bar {
    String get bar => "22";
  }

  void main() {
    Foo(bar: 42);
  }

