# Standing in the body we can't access the initializing formal.

sources: |
  void main() {
    new Foo(1, 42);
  }

  class Foo {
    num i;
    int j;

    Foo(int this.i, int x) : j = i * x {
      print(i);
    }
  }

# We pretend like the VM sends over "i" too. It currently doesn't though.
definitions: ["i", "x"]
# We pretend the VM doesn't send over information so we can see a difference in
# the output when we find the actual type (i.e. when we find it to be in scope).
definition_types: ["null", "null"]
type_definitions: []
type_bounds: []
type_defaults: []
method: "Foo"
position: "#Foo"
static: false
offset: 115 # on the "i" in "print" in the body.
scriptUri: main.dart
expression: |
  i.isEven
