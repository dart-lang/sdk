name: dwds
# Every time this changes you need to run `dart run tool/build.dart`.
version: 27.1.1-wip

description: >-
  A service that proxies between the Chrome debug protocol and the Dart VM
  service protocol.
environment:
  sdk: ^3.12.0-0

resolution: workspace

dependencies:
  async: ^2.9.0
  collection: ^1.15.0
  crypto: ^3.0.2
  dds: ^5.3.0
  file: ">=6.1.4 <8.0.0"
  http: ^1.0.0
  http_multi_server: ^3.2.0
  logging: ^1.0.2
  meta: ^1.9.1
  package_config: ^2.0.2
  path: ^1.8.1
  pool: ^1.5.0
  pub_semver: ^2.1.1
  shelf: ^1.3.0
  shelf_proxy: ^1.0.4
  shelf_web_socket: ">=2.0.0 <4.0.0"
  source_maps: ^0.10.10
  sse: ^4.2.0
  stack_trace: ^1.10.0
  stream_channel: ^2.1.2
  vm_service: ">=14.2.4 <16.0.0"
  vm_service_interface: ^2.0.1
  web_socket: ^1.0.1
  web_socket_channel: ">=2.2.0 <4.0.0"
  webkit_inspection_protocol: ^1.0.1

dev_dependencies:
  dart_flutter_team_lints: any
  dwds_test_common: any
  graphs: any
  io: any
  mime: any
  test: any
  web: any
  webdriver: any
  yaml: any
