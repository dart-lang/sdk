name: dwds
# Every time this changes you need to run `dart run build_runner build`.
version: 27.1.1-wip

description: >-
  A service that proxies between the Chrome debug protocol and the Dart VM
  service protocol.
repository: https://github.com/dart-lang/webdev/tree/main/dwds
environment:
  sdk: ^3.12.0-307.0.dev

dependencies:
  async: ^2.9.0
  collection: ^1.15.0
  crypto: ^3.0.2
  dds: ^5.3.0
  file: ">=6.1.4 <8.0.0"
  http: ^1.0.0
  http_multi_server: ^3.2.0
  logging: ^1.0.2
  meta: ^1.9.1
  package_config: ^2.0.2
  path: ^1.8.1
  pool: ^1.5.0
  pub_semver: ^2.1.1
  shelf: ^1.3.0
  shelf_packages_handler: ^3.0.0
  shelf_proxy: ^1.0.4
  shelf_static: ^1.1.0
  shelf_web_socket: ">=2.0.0 <4.0.0"
  source_maps: ^0.10.10
  sse: ^4.2.0
  stack_trace: ^1.10.0
  stream_channel: ^2.1.2
  vm_service: ">=14.2.4 <16.0.0"
  vm_service_interface: ^2.0.1
  web: ^1.1.0
  web_socket: ^1.0.1
  web_socket_channel: ">=2.2.0 <4.0.0"
  webkit_inspection_protocol: ^1.0.1

dev_dependencies:
  args: ^2.4.2
  build_daemon: ^4.0.0
  dart_flutter_team_lints: ^3.5.2
  dwds_test_common:
    path: ../dwds_test_common
  graphs: ^2.1.0
  io: ^1.0.5
  js: ">=0.6.4 <0.8.0"
  mime: ^2.0.0
  test: ^1.21.6
  webdriver: ^3.0.0
  yaml: ^3.1.3

dependency_overrides:
  sse:
    git:
      url: https://github.com/dart-lang/tools.git
      ref: 06493ded8ca27996d979f9f903d2bc24a1215064
      path: pkgs/sse
